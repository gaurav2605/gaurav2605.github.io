    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #0F172A; overflow-x: hidden; }
        
        /* Bento Glass Panes with Depth Shadows */
        .glass-bento {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transform-style: preserve-3d;
            box-shadow: 0 20px 45px -10px rgba(30, 58, 138, 0.05), 0 10px 20px -15px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease, border-color 0.3s ease, background-color 0.3s ease;
        }
        .glass-bento:hover {
            background: rgba(255, 255, 255, 0.92);
            border-color: rgba(30, 58, 138, 0.25);
            box-shadow: 0 30px 60px -15px rgba(30, 58, 138, 0.08);
        }

        /* Blueprint Lines Backplane Background */
        .blueprint-grid {
            background-size: 60px 60px;
            background-image: 
                linear-gradient(to right, rgba(30, 58, 138, 0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(30, 58, 138, 0.015) 1px, transparent 1px);
        }
    </style>
